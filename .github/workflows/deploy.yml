name: Validation & Quality Gate

on:
  pull_request:
    branches: [main, develop]
  push:
    branches: [main, develop]

jobs:
  # 1. Ensure the code is clean and builds correctly
  validate:
    name: 🏗️ Validate Code
    runs-on: ubuntu-latest
    steps:
      - name: 📥 Checkout Code
        uses: actions/checkout@v4

      - name: 🟢 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: 📦 Install Dependencies
        run: npm ci

      - name: 🧪 Run Lint & Format
        run: |
          npm run lint
          npm run format:check

      - name: 🛠️ Build Check
        run: npm run build
        env:
          NEXT_PUBLIC_API_BASE_URL: http://localhost:3001/api
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GEMINI_API_KEY_ALT: ${{ secrets.GEMINI_API_KEY_ALT }}

  # 2. Final check for merge conflicts (PRs only)
  check-conflicts:
    name: 🛡️ Conflict Check
    runs-on: ubuntu-latest
    needs: [validate]
    if: github.event_name == 'pull_request'
    steps:
      - name: 📥 Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: 🔍 Verify Mergeability
        run: |
          git fetch origin ${{ github.base_ref }}
          if git merge --no-commit --no-ff origin/${{ github.base_ref }} 2>&1 | grep -q "CONFLICT"; then
            echo "❌ CONFLICT: Branch is out of sync."
            exit 1
          else
            echo "✅ No conflicts."
          fi

  # 3. Docs and changelog validation for PRs
  docs-maintenance:
    name: 📝 Docs & Changelog Validation
    runs-on: ubuntu-latest
    needs: [validate]
    if: github.event_name == 'pull_request'
    steps:
      - name: 📥 Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: 🔎 Validate README / docs / changelog updates
        run: |
          git fetch origin ${{ github.base_ref }}
          CODE_CHANGED=$(git diff --name-only origin/${{ github.base_ref }}...HEAD | grep -E '^(src/|api/|package.json|tsconfig.json|next.config.ts)' || true)
          DOCS_CHANGED=$(git diff --name-only origin/${{ github.base_ref }}...HEAD | grep -E '^(docs/|README.md|CHANGELOG.md|ENV_VARS.md)' || true)
          if [ -n "$CODE_CHANGED" ] && [ -z "$DOCS_CHANGED" ]; then
            echo "❌ Code changes were detected without updating README, docs, or CHANGELOG.md."
            echo "Please update documentation in this PR."
            echo "Changed code files:"
            echo "$CODE_CHANGED"
            exit 1
          fi

  # 4. Status signal that Vercel looks for
  pr-ready:
    name: 🏁 PR Readiness Signal
    runs-on: ubuntu-latest
    needs: [check-conflicts]
    if: github.event_name == 'pull_request'
    steps:
      - name: ✅ Approval
        run: echo "Code is validated. Vercel is free to deploy upon merge."